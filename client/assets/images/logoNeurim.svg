<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 68" width="220" height="68">
  <defs>
    <style>
      .logo-text {
        font-family: 'Trebuchet MS', 'Arial', sans-serif;
        font-weight: 800;
        font-size: 46px;
        fill: #0076BE;
      }
    </style>
  </defs>

  <!-- "Neur" -->
  <text class="logo-text" x="4" y="52">Neur</text>

  <!-- "i" vertical stem -->
  <rect x="112" y="26" width="7" height="27" rx="3" fill="#0076BE"/>

  <!-- Shoe lace bow replacing the "i" dot -->

  <!-- Left loop -->
  <path d="M 115 22
           C 115 16  108 7  103 12
           C 100 16  106 21 115 22"
        fill="#0076BE"/>

  <!-- Right loop -->
  <path d="M 116 22
           C 116 16  123 7  128 12
           C 131 16  125 21 116 22"
        fill="#0076BE"/>

  <!-- Left tail -->
  <line x1="113" y1="23" x2="108" y2="28" stroke="#0076BE" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Right tail -->
  <line x1="118" y1="23" x2="123" y2="28" stroke="#0076BE" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Center knot -->
  <ellipse cx="115.5" cy="22" rx="3.5" ry="2.5" fill="#003952"/>

  <!-- "m" -->
  <text class="logo-text" x="124" y="52">m</text>
</svg>
