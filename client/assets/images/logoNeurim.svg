<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 255 80" width="255" height="80">
  <defs>
    <style>
      .logo-text {
        font-family: 'Trebuchet MS', 'Arial', sans-serif;
        font-weight: 800;
        font-size: 53px;
        fill: #1e8a3c;
      }
    </style>

    <!-- Vertical gradient: lighter heel (top) → darker toe (bottom) -->
    <linearGradient id="sole-grad" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%"   stop-color="#2eb85c"/>
      <stop offset="100%" stop-color="#0d4a1e"/>
    </linearGradient>

    <!-- Clip path matches sole outline exactly -->
    <clipPath id="sole-clip">
      <path d="M 138 32
               C 142 32, 147 35.5, 147 42
               C 147 51, 145 58, 142 61.5
               C 141 62.5, 135 62.5, 134 61.5
               C 131 58, 129 51, 129 42
               C 129 35.5, 134 32, 138 32 Z"/>
    </clipPath>
  </defs>

  <!-- "Neur" -->
  <text class="logo-text" x="5" y="61">Neur</text>

  <!-- ── Shoe sole ─────────────────────────────────────── -->

  <!-- Shadow layer (slight dark blur behind sole for lift) -->
  <path d="M 138 33
           C 142 33, 148 36.5, 148 43
           C 148 52, 146 59, 143 62.5
           C 141.5 63.5, 134.5 63.5, 133 62.5
           C 130 59, 128 52, 128 43
           C 128 36.5, 134 33, 138 33 Z"
        fill="#051a0b" opacity="0.18" transform="translate(1.5,2)"/>

  <!-- Sole body with gradient fill -->
  <path d="M 138 32
           C 142 32, 147 35.5, 147 42
           C 147 51, 145 58, 142 61.5
           C 141 62.5, 135 62.5, 134 61.5
           C 131 58, 129 51, 129 42
           C 129 35.5, 134 32, 138 32 Z"
        fill="url(#sole-grad)"/>

  <!-- Tread grooves — two thin white lines in the toe third -->
  <g clip-path="url(#sole-clip)">
    <line x1="126" y1="52" x2="150" y2="52"
          stroke="white" stroke-width="1.8" stroke-opacity="0.35"/>
    <line x1="126" y1="57.5" x2="150" y2="57.5"
          stroke="white" stroke-width="1.8" stroke-opacity="0.35"/>
  </g>

  <!-- Specular highlight — upper-left for subtle 3-D depth -->
  <ellipse cx="133" cy="38" rx="3" ry="5"
           fill="white" opacity="0.22" clip-path="url(#sole-clip)"/>

  <!-- ── "i" dot ─────────────────────────────────────── -->
  <circle cx="138" cy="19" r="6" fill="#1e8a3c"/>

  <!-- "m" -->
  <text class="logo-text" x="152" y="61">m</text>
</svg>
