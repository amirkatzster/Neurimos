<div class="collection-page">
  <h1 class="visually-hidden">{{ queries.join(' ') }}</h1>
  <div class="container-fluid px-3">

    <!-- Results header -->
    <div class="results-bar">
      <div class="results-bar-text">
        <div class="results-summary" *ngIf="shoes?.length > 0" aria-live="polite" aria-atomic="true">
          <span class="results-count">{{ shoes?.length }} נעליים</span>
        </div>
        <div class="results-summary results-empty" *ngIf="shoes?.length === 0" aria-live="polite" aria-atomic="true">
          <i class="fa fa-search" aria-hidden="true"></i>
          לא נמצאו תוצאות עבור <strong>"{{ queries.join(' ') }}"</strong>
        </div>
      </div>

      <div class="results-bar-sort d-none d-md-flex">
        <mat-form-field appearance="outline" class="sort-field">
          <mat-label>מיון</mat-label>
          <mat-select [(ngModel)]="sort" (ngModelChange)="sortChangeEvent($event)">
            <mat-option *ngFor="let s of sortList" [value]="s.value">{{ s.viewValue }}</mat-option>
          </mat-select>
        </mat-form-field>
      </div>
    </div>

    <!-- Active filter chips -->
    <div class="active-filters" *ngIf="filters?.length > 0 || selectedSizes?.length > 0">
      <span class="active-filters-label">
        <i class="fa fa-filter"></i> סינון פעיל
      </span>
      <div class="active-filters-chips">
        <span class="active-chip" *ngFor="let filter of filters">
          {{ filter }}
          <button class="active-chip-remove" (click)="removeFilter(filter)" [attr.aria-label]="'הסר סינון ' + filter">×</button>
        </span>
        <span class="active-chip active-chip-size" *ngFor="let size of selectedSizes">
          מידה {{ size }}
          <button class="active-chip-remove" (click)="removeSizeFilter(size)" [attr.aria-label]="'הסר מידה ' + size">×</button>
        </span>
      </div>
    </div>

    <div class="row g-0">
      <!-- Shoe grid -->
      <div class="col-md-10 col-12">
        <div class="row g-2 shoe-grid">
          <div *ngFor="let shoe of shoes" class="col-6 col-sm-4 col-md-4 col-lg-3">
            <app-collection-shoe [shoe]="shoe"></app-collection-shoe>
          </div>
        </div>
      </div>

      <!-- Side filter panel (desktop) -->
      <div class="col-md-2 d-none d-md-block">
        <div class="filter-panel" role="search" aria-label="סינון מוצרים">

          <button *ngIf="filters.indexOf('SALE') == -1"
                  class="sale-btn" (click)="addFiler('SALE')"
                  aria-pressed="false">
            <i class="fa fa-tag" aria-hidden="true"></i> רק מבצעים
          </button>

          <mat-accordion [multi]="true">

            <!-- Size -->
            <mat-expansion-panel [expanded]="true">
              <mat-expansion-panel-header class="filter-panel-header">מידה</mat-expansion-panel-header>
              <div class="size-chips">
                <button class="size-chip" *ngFor="let size of sizes"
                        [class.active]="selectedSizes.includes(size.toString())"
                        (click)="addSizeFilter(size.toString())">
                  {{ size }}
                </button>
              </div>
            </mat-expansion-panel>

            <!-- Company -->
            <mat-expansion-panel [expanded]="true">
              <mat-expansion-panel-header class="filter-panel-header">חברה</mat-expansion-panel-header>
              <div class="filter-link-list">
                <button class="filter-link" *ngFor="let company of companies"
                        (click)="addFiler(company.key)">
                  {{ company.key }} <span class="filter-count">({{ company.count }})</span>
                </button>
              </div>
            </mat-expansion-panel>

            <!-- Color -->
            <mat-expansion-panel [expanded]="true">
              <mat-expansion-panel-header class="filter-panel-header">צבע</mat-expansion-panel-header>
              <div class="filter-link-list">
                <button class="filter-link" *ngFor="let color of colors"
                        (click)="addFiler(color.key)">
                  {{ color.key }} <span class="filter-count">({{ color.count }})</span>
                </button>
              </div>
            </mat-expansion-panel>

          </mat-accordion>
        </div>
      </div>
    </div>

  </div>
</div>
