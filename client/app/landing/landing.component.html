<!-- Hero banner carousel -->
<div class="hero-banner">
  <div class="hero-carousel">
    <div *ngFor="let slide of slides; let i = index"
         class="hero-slide"
         [class.active]="i === currentSlide">
      <img [src]="slide.url"
           [alt]="slide.alt"
           class="hero-img"
           (load)="i === 0 && (showPromotion = true)">
    </div>
  </div>
  <div class="carousel-dots">
    <button *ngFor="let slide of slides; let i = index"
            class="carousel-dot"
            [class.active]="i === currentSlide"
            (click)="currentSlide = i"
            [attr.aria-label]="'תמונה ' + (i + 1)"></button>
  </div>
  <div *ngIf="showPromotion" class="hero-card">
    <h4>משלוח חינם הביתה - ביחד עוברים את זה</h4>
    <p><strong>נעלי נעורים מחזקת את חיילינו האמיצים ביחד ננצח ונחזור לימים טובים<br><img src="https://upload.wikimedia.org/wikipedia/commons/thumb/d/d4/Flag_of_Israel.svg/250px-Flag_of_Israel.svg.png" alt="דגל ישראל" class="hero-flag"></strong></p>
    <a class="btn hero-btn" routerLink="/נעלי/נעליים">לקנייה עכשיו</a>
  </div>
</div>

<!-- Category tiles -->
<section class="categories-section">
  <h2 class="categories-title">קטגוריות</h2>
  <div class="categories-grid">

    <a routerLink="/נעלי/גברים" class="cat-card cat-men">
      <div class="cat-overlay"></div>
      <div class="cat-content">
        <span class="cat-icon">👟</span>
        <span class="cat-label">גברים</span>
        <span class="cat-sub">נעלי גברים</span>
      </div>
      <i class="fa fa-arrow-left cat-arrow" aria-hidden="true"></i>
    </a>

    <a routerLink="/נעלי/נשים" class="cat-card cat-women">
      <div class="cat-overlay"></div>
      <div class="cat-content">
        <span class="cat-icon">👠</span>
        <span class="cat-label">נשים</span>
        <span class="cat-sub">נעלי נשים</span>
      </div>
      <i class="fa fa-arrow-left cat-arrow" aria-hidden="true"></i>
    </a>

    <a routerLink="/נעלי/ילדים" class="cat-card cat-boys">
      <div class="cat-overlay"></div>
      <div class="cat-content">
        <span class="cat-icon">👦</span>
        <span class="cat-label">ילדים</span>
        <span class="cat-sub">נעלי ילדים</span>
      </div>
      <i class="fa fa-arrow-left cat-arrow" aria-hidden="true"></i>
    </a>

    <a routerLink="/נעלי/ילדות" class="cat-card cat-girls">
      <div class="cat-overlay"></div>
      <div class="cat-content">
        <span class="cat-icon">👧</span>
        <span class="cat-label">ילדות</span>
        <span class="cat-sub">נעלי ילדות</span>
      </div>
      <i class="fa fa-arrow-left cat-arrow" aria-hidden="true"></i>
    </a>

  </div>
</section>

<!-- Brand logos -->
<section class="brands-section">
  <div class="container-fluid">
    <h2 class="brands-title">המותגים שלנו</h2>
    <div class="row g-2 justify-content-center">
      <div *ngFor="let company of companies" class="col-4 col-md-2 brand-col">
        <a [routerLink]="'/נעלי/' + company.name" class="brand-link">
          <img [src]="company.image" [alt]="company.name" class="brand-img">
        </a>
      </div>
    </div>
  </div>
</section>
