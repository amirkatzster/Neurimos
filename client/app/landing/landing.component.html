<!-- Hero banner carousel -->
<div class="hero-banner">
  <div class="hero-carousel">
    <div *ngFor="let slide of slides; let i = index"
         class="hero-slide"
         [class.active]="i === currentSlide">
      <img [src]="slide.url"
           [alt]="slide.alt"
           class="hero-img"
           (load)="i === 0 && (showPromotion = true)">
    </div>
  </div>
  <div class="carousel-dots">
    <button *ngFor="let slide of slides; let i = index"
            class="carousel-dot"
            [class.active]="i === currentSlide"
            (click)="currentSlide = i"
            [attr.aria-label]="'תמונה ' + (i + 1)"></button>
  </div>
  <div *ngIf="showPromotion" class="hero-card">
    <h4>משלוח עד הבית</h4>
    <p><strong>במיוחד בתקופה הזאת</strong></p>
    <a class="btn hero-btn" routerLink="/נעלי/נייק">לקנייה עכשיו</a>
  </div>
</div>

<!-- Category tiles -->
<section class="categories-section">
  <div class="container-fluid">
    <div class="row g-3 justify-content-center">
      <div class="col-6 col-md-3">
        <a routerLink="/נעלי/גברים" class="category-tile">
          <div class="category-icon"><i class="fa fa-male" aria-hidden="true"></i></div>
          <span class="category-label">גברים</span>
        </a>
      </div>
      <div class="col-6 col-md-3">
        <a routerLink="/נעלי/נשים" class="category-tile">
          <div class="category-icon"><i class="fa fa-female" aria-hidden="true"></i></div>
          <span class="category-label">נשים</span>
        </a>
      </div>
      <div class="col-6 col-md-3">
        <a routerLink="/נעלי/ילדים" class="category-tile">
          <div class="category-icon"><i class="fa fa-child" aria-hidden="true"></i></div>
          <span class="category-label">ילדים</span>
        </a>
      </div>
      <div class="col-6 col-md-3">
        <a routerLink="/נעלי/ילדות" class="category-tile">
          <div class="category-icon"><i class="fa fa-child" aria-hidden="true"></i></div>
          <span class="category-label">ילדות</span>
        </a>
      </div>
    </div>
  </div>
</section>

<!-- Brand logos -->
<section class="brands-section">
  <div class="container-fluid">
    <h2 class="brands-title">המותגים שלנו</h2>
    <div class="row g-2 justify-content-center">
      <div *ngFor="let company of companies" class="col-4 col-md-2 brand-col">
        <a [routerLink]="'/נעלי/' + company.name" class="brand-link">
          <img [src]="company.image" [alt]="company.name" class="brand-img">
        </a>
      </div>
    </div>
  </div>
</section>
