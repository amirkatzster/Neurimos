<app-toast [message]="toast.message"></app-toast>

<div class="login-page">
  <div class="login-card">

    <div class="login-header">
      <a routerLink="/"><img src="assets/images/logoNeurim.svg" alt="נעלי נעורים" class="login-logo"></a>
      <h1 class="login-title">ברוכים הבאים</h1>
      <p class="login-sub">התחברו לחשבונכם</p>
    </div>

    <a href="/api/auth/google" class="btn-google">
      <svg class="google-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      המשך עם Google
    </a>

    <div class="login-divider"><span>או</span></div>

    <form [formGroup]="loginForm" (ngSubmit)="login()" class="login-form">
      <div class="login-field" [class.field-error]="!email.pristine && !email.valid">
        <i class="fa fa-envelope login-field-icon"></i>
        <input class="login-input" type="email" name="email" formControlName="email" placeholder='דוא"ל' autofocus>
      </div>
      <div class="login-field" [class.field-error]="!password.pristine && !password.valid">
        <i class="fa fa-lock login-field-icon"></i>
        <input class="login-input" type="password" name="password" formControlName="password" placeholder="סיסמה">
      </div>
      <button class="btn-login" type="submit" [disabled]="!loginForm.valid">
        כניסה <i class="fa fa-arrow-left"></i>
      </button>
    </form>

    <p class="login-register">
      עדיין לא רשומים? <a routerLink="/register">הרשמו כאן</a>
    </p>

  </div>
</div>

<div id="fb-root"></div>
<script>(function(d, s, id) {
  var js, fjs = d.getElementsByTagName(s)[0];
  if (d.getElementById(id)) return;
  js = d.createElement(s); js.id = id;
  js.src = 'https://connect.facebook.net/en_US/sdk.js#xfbml=1&version=v2.11&appId=1764565033853258';
  fjs.parentNode.insertBefore(js, fjs);
}(document, 'script', 'facebook-jssdk'));</script>
