<div class="summary-page">

  <div class="summary-card">

    <!-- Animated checkmark -->
    <div class="check-wrap">
      <svg class="checkmark" viewBox="0 0 52 52" aria-hidden="true">
        <circle class="checkmark__circle" cx="26" cy="26" r="25" fill="none"/>
        <path class="checkmark__check" fill="none" d="M14 27 l8 8 16-16"/>
      </svg>
    </div>

    <!-- Hero text -->
    <h1 class="summary-title">ההזמנה התקבלה!</h1>
    <p class="summary-sub">שלום <strong>{{ auth.currentUser.username }}</strong>, ההזמנה שלך התקבלה ונמצאת כעת בבדיקה.</p>

    <!-- Info pills -->
    <div class="summary-pills">
      <div class="pill pill-active">
        <i class="fa fa-search"></i>
        <span>ההזמנה בבדיקה</span>
      </div>
      <div class="pill-arrow">&#x25C4;</div>
      <div class="pill">
        <i class="fa fa-cube"></i>
        <span>אריזה ומשלוח</span>
      </div>
      <div class="pill-arrow">&#x25C4;</div>
      <div class="pill">
        <i class="fa fa-home"></i>
        <span>אצלך בבית</span>
      </div>
    </div>

    <!-- Payment note -->
    <div class="summary-note">
      <i class="fa fa-credit-card"></i>
      החיוב יתבצע רק כאשר המוצר יהיה מוכן למסירה
    </div>

    <!-- Order ID -->
    <div class="summary-order-id">
      מזהה הזמנה: <span>{{ orderId() }}</span>
    </div>

    <!-- CTA -->
    <button type="button" class="btn-back-shop" routerLink="/">
      <i class="fa fa-shopping-bag"></i> המשך בקנייה
    </button>

    <!-- Footer -->
    <p class="summary-footer">
      <i class="fa fa-phone"></i> צוות נעורים לשירותכם &mdash;
      <a href="tel:035052769">03-5052769</a>
    </p>

  </div>

</div>
