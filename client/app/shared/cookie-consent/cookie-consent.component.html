<div class="cookie-banner" *ngIf="visible">
  <div class="cookie-text">
    אתר זה משתמש בעוגיות (Cookies) לצורך התחברות, שיפור חוויית המשתמש וניתוח גלישה.
    <a routerLink="/takanon" class="cookie-link">מדיניות הפרטיות</a>
  </div>
  <button class="cookie-btn" (click)="accept()">הבנתי, אני מסכים</button>
</div>
