<app-loading [condition]="isLoading"></app-loading>
<app-toast [message]="toast.message"></app-toast>

<!-- ─── List View ─────────────────────────────────────────────────────────── -->
<div class="admin-section" dir="rtl" *ngIf="!isLoading && !isDialogOpen">
  <div class="section-header">
    <div>
      <h5 class="section-title">חברות</h5>
      <span class="section-count">{{companies.length}} חברות</span>
    </div>
    <button type="button" (click)="addCompany()" class="btn-add">
      <i class="fa fa-plus"></i>
      <span>חברה חדשה</span>
    </button>
  </div>

  <div *ngIf="companies.length === 0" class="empty-state">
    <i class="fa fa-building fa-2x"></i>
    <p>אין חברות במערכת</p>
  </div>

  <div class="company-grid">
    <div *ngFor="let company of companies; let i = index" class="company-card" role="button" tabindex="0" [attr.aria-label]="'ערוך חברה ' + company.name" (click)="enableEditing(company, i)" (keydown.enter)="enableEditing(company, i)">
      <img *ngIf="company.image" [src]="company.image" class="company-logo" [attr.alt]="'לוגו ' + company.name">
      <div *ngIf="!company.image" class="company-logo-placeholder">
        <i class="fa fa-building"></i>
      </div>
      <div class="company-info">
        <div class="company-name">{{company.name}}</div>
        <div class="company-desc">{{company.information}}</div>
      </div>
      <div class="company-actions" (click)="$event.stopPropagation()">
        <button class="icon-btn icon-btn-shoes" [attr.aria-label]="'הצג נעליים של ' + company.name" (click)="filterByCompany.emit(company.name)">
          <i class="fa fa-shopping-bag" aria-hidden="true"></i>
        </button>
        <button class="icon-btn icon-btn-edit" [attr.aria-label]="'ערוך ' + company.name" (click)="enableEditing(company, i)">
          <i class="fa fa-pencil" aria-hidden="true"></i>
        </button>
      </div>
    </div>
  </div>
</div>

<!-- ─── Edit View ─────────────────────────────────────────────────────────── -->
<div class="admin-edit-container" dir="rtl" *ngIf="isDialogOpen">
  <form #editForm="ngForm" (ngSubmit)="doneEditCompany(currentCompany)">

    <div class="admin-action-bar">
      <div class="bar-group">
        <button type="button" class="bar-btn bar-btn-ghost" (click)="isDialogOpen = false">
          <i class="fa fa-arrow-right"></i>
          <span class="bar-btn-label">חזרה</span>
        </button>
      </div>
      <h5 class="bar-title">{{ currentCompany.name || 'חברה חדשה' }}</h5>
      <div class="bar-group">
        <button type="submit" class="bar-btn bar-btn-primary" [disabled]="!editForm.form.valid">
          <i class="fa fa-save"></i>
          <span class="bar-btn-label">שמור</span>
        </button>
      </div>
    </div>

    <div class="edit-card">
      <div class="edit-card-header"><i class="fa fa-building"></i> פרטי חברה</div>
      <div class="edit-card-body">
        <div class="field-block mb-3">
          <label class="field-label">שם חברה</label>
          <input class="field-input" type="text" name="name" [(ngModel)]="currentCompany.name" placeholder="שם החברה" required>
        </div>
        <div class="field-block">
          <label class="field-label">תיאור</label>
          <textarea class="field-textarea" rows="5" name="information" [(ngModel)]="currentCompany.information" placeholder="כמה מילים על החברה..."></textarea>
        </div>
      </div>
    </div>

    <div class="edit-card">
      <div class="edit-card-header"><i class="fa fa-image"></i> לוגו</div>
      <div class="edit-card-body">
        <div *ngIf="currentCompany.image" class="logo-preview">
          <img [src]="currentCompany.image" class="logo-preview-img" [attr.alt]="'לוגו ' + (currentCompany.name || 'חברה')">
          <button type="button" class="icon-btn icon-btn-danger" aria-label="הסר לוגו" (click)="currentCompany.image = null">
            <i class="fa fa-trash" aria-hidden="true"></i>
          </button>
        </div>
        <label class="upload-area" [class.has-image]="currentCompany.image">
          <i class="fa fa-upload"></i>
          <span>{{ currentCompany.image ? 'החלף תמונה' : 'בחר תמונה' }}</span>
          <input type="file" accept="image/*" name="image" (change)="handleInputChange($event)" hidden>
        </label>
      </div>
    </div>

    <div class="edit-bottom-bar">
      <button type="button" class="btn btn-outline-secondary" (click)="isDialogOpen = false">
        <i class="fa fa-arrow-right"></i> חזרה
      </button>
      <button type="submit" class="btn btn-primary px-4" [disabled]="!editForm.form.valid">
        <i class="fa fa-save"></i> שמור
      </button>
    </div>

  </form>
</div>
