<app-loading [condition]="isLoading"></app-loading>

<app-toast [message]="toast.message"></app-toast>

<div class="card" *ngIf="!isLoading">
  <h4 class="card-header">מספר חברות במערכת ({{companies.length}})</h4>
  <div class="card-block">
    <button type="button" (click)="addCompany()" class="btn btn-primary btn-circle"><i class="fa fa-plus" aria-hidden="true"></i></button>
    <table class="table table-striped table-responsive" >
      <thead class="thead-light">
        <tr>
          <th></th>
          <th>לוגו</th>
          <th>חברה</th>
          <th style="width:400px">כמה מילים על החברה</th>
        </tr>
      </thead>
      <tbody *ngIf="companies.length === 0">
        <tr>
          <td colspan="4">אין חברות</td>
        </tr>
      </tbody>
      <tbody>
        <tr *ngFor="let company of companies;let i = index">
          <td>
            <button class="btn btn-sm btn-warning" (click)="enableEditing(company, i)"><i class="fa fa-pencil"></i></button>
          </td>
          <td>
            <img *ngIf="company.image" [src]="company.image" width="60" height="60" class="rounded">
          </td>
          <td>{{company.name}}</td>
          <td>{{company.information}}</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>

<!-- Edit Modal -->
<div class="modal-backdrop fade show" *ngIf="isDialogOpen" (click)="isDialogOpen = false"></div>
<div class="modal d-block" tabindex="-1" *ngIf="isDialogOpen">
  <div class="modal-dialog modal-dialog-centered" dir="rtl">
    <div class="modal-content">
      <form (ngSubmit)="doneEditCompany(currentCompany)">
        <div class="modal-header">
          <h5 class="modal-title">עריכת חברה</h5>
          <button type="button" class="btn-close" (click)="isDialogOpen = false"></button>
        </div>
        <div class="modal-body addForm">
          <div class="form-group mb-3">
            <label for="Name">חברה</label>
            <input id="Name" class="form-control" type="text" name="company" [(ngModel)]="currentCompany.name" placeholder="נמרוד" required>
          </div>
          <div class="form-group mb-3">
            <textarea class="form-control" rows="3" name="information" [(ngModel)]="currentCompany.information" placeholder="...ספרו על החברה" required></textarea>
          </div>
          <div class="form-group mb-3">
            <input type="file" accept="image/*" name="image" (change)="handleInputChange($event)" />
          </div>
          <table *ngIf="currentCompany.image != null">
            <tr>
              <td>
                <button type="button" class="btn btn-lg btn-danger trashBtn" (click)="currentCompany.image = null"><i class="fa fa-6 fa-trash" aria-hidden="true"></i></button>
              </td>
              <td>
                <img [src]="currentCompany.image" class="rounded mx-auto d-block" width="200" height="200">
              </td>
            </tr>
          </table>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" (click)="isDialogOpen = false">סגור</button>
          <button type="submit" class="btn btn-primary">שמור</button>
        </div>
      </form>
    </div>
  </div>
</div>
