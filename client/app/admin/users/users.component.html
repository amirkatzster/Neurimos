<app-loading [condition]="isLoading"></app-loading>
<app-toast [message]="toast.message"></app-toast>

<div class="admin-section" dir="rtl" *ngIf="!isLoading">
  <div class="section-header">
    <div>
      <h5 class="section-title">משתמשים</h5>
      <span class="section-count">{{users.length}} משתמשים רשומים</span>
    </div>
  </div>

  <div *ngIf="users.length === 0" class="empty-state">
    <i class="fa fa-users fa-2x"></i>
    <p>אין משתמשים רשומים</p>
  </div>

  <div class="user-list">
    <div *ngFor="let user of users" class="user-row">
      <div class="user-avatar">
        <i class="fa fa-user"></i>
      </div>
      <div class="user-info">
        <div class="user-name">{{user.username}}</div>
        <div class="user-email">{{user.email}}</div>
      </div>
      <span class="user-role" [class.role-admin]="user.role === 'admin'">{{user.role}}</span>
      <button *ngIf="user.role !== 'admin' && auth.currentUser._id !== user._id"
        class="icon-btn icon-btn-danger"
        (click)="deleteUser(user)"
        title="מחק משתמש">
        <i class="fa fa-trash"></i>
      </button>
      <div *ngIf="user.role === 'admin' || auth.currentUser._id === user._id" class="icon-btn-spacer"></div>
    </div>
  </div>
</div>
