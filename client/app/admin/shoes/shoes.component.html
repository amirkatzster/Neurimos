<app-loading [condition]="isLoading"></app-loading>
<app-toast [message]="toast.message"></app-toast>

<div class="admin-section" dir="rtl" *ngIf="!isLoading">
  <div class="section-header">
    <div>
      <h5 class="section-title">נעליים<span *ngIf="filterCompany"> — {{filterCompany}}</span></h5>
      <span class="section-count">{{filteredShoes.length}} דגמים</span>
    </div>
    <button type="button" [routerLink]="'/admin/shoeedit/'" class="btn-add">
      <i class="fa fa-plus"></i>
      <span>נעל חדשה</span>
    </button>
  </div>

  <div *ngIf="filteredShoes.length === 0" class="empty-state">
    <i class="fa fa-archive fa-2x"></i>
    <p>אין נעליים במערכת</p>
  </div>

  <!-- Mobile Cards -->
  <div class="shoe-cards d-md-none">
    <div *ngFor="let shoe of filteredShoes" class="shoe-card" role="button" tabindex="0" [attr.aria-label]="shoe.name" [routerLink]="'/admin/shoeedit/' + shoe._id">
      <img *ngIf="shoe.imagesGroup?.[0]?.images?.[0]?.urlSmall" [src]="shoe.imagesGroup[0].images[0].urlSmall" class="shoe-card-img" [attr.alt]="shoe.company + ' ' + shoe.name">
      <div class="shoe-card-body">
        <div class="shoe-card-name">{{shoe.name}}</div>
        <div class="shoe-card-meta">
          <span class="shoe-id">{{shoe.id}}</span>
          <span class="shoe-company">{{shoe.company}}</span>
        </div>
        <div class="shoe-card-badges">
          <span class="badge" [class.badge-active]="shoe.active" [class.badge-inactive]="!shoe.active">
            {{shoe.active ? 'פעיל' : 'לא פעיל'}}
          </span>
          <span class="gender-icons">
            <i *ngIf="shoe.gender.indexOf('גברים') > -1" class="fa fa-mars"></i>
            <i *ngIf="shoe.gender.indexOf('נשים') > -1" class="fa fa-venus"></i>
            <i *ngIf="shoe.gender.indexOf('ילדים') > -1 || shoe.gender.indexOf('ילדות') > -1" class="fa fa-child"></i>
          </span>
        </div>
      </div>
      <button type="button" class="shoe-card-delete" [attr.aria-label]="'מחק ' + shoe.name" (click)="$event.stopPropagation(); deleteShoeConfirm(shoe)">
        <i class="fa fa-trash" aria-hidden="true"></i>
      </button>
    </div>
  </div>

  <!-- Desktop Table -->
  <div class="table-responsive d-none d-md-block">
    <table class="admin-table">
      <thead>
        <tr>
          <th style="width:44px"></th>
          <th style="width:60px">תמונה</th>
          <th>דגם</th>
          <th>חברה</th>
          <th style="width:80px">מזהה</th>
          <th style="width:70px">פעיל</th>
          <th style="width:80px">קהל</th>
          <th style="width:44px"></th>
        </tr>
      </thead>
      <tbody>
        <tr *ngIf="filteredShoes.length === 0">
          <td colspan="8" class="empty-cell">אין נעליים</td>
        </tr>
        <tr *ngFor="let shoe of filteredShoes">
          <td>
            <button class="icon-btn icon-btn-edit" [routerLink]="'/admin/shoeedit/' + shoe._id" [attr.aria-label]="'ערוך ' + shoe.name">
              <i class="fa fa-pencil" aria-hidden="true"></i>
            </button>
          </td>
          <td>
            <img *ngIf="shoe.imagesGroup?.[0]?.images?.[0]?.urlSmall"
              [src]="shoe.imagesGroup[0].images[0].urlSmall"
              class="table-shoe-img" [attr.alt]="shoe.company + ' ' + shoe.name">
          </td>
          <td class="fw-medium">{{shoe.name}}</td>
          <td>{{shoe.company}}</td>
          <td><code class="shoe-id-code">{{shoe.id}}</code></td>
          <td>
            <span class="badge" [class.badge-active]="shoe.active" [class.badge-inactive]="!shoe.active">
              {{shoe.active ? 'פעיל' : 'לא פעיל'}}
            </span>
          </td>
          <td class="gender-icons">
            <i *ngIf="shoe.gender.indexOf('גברים') > -1" class="fa fa-mars fa-lg" title="גברים"></i>
            <i *ngIf="shoe.gender.indexOf('נשים') > -1" class="fa fa-venus fa-lg" title="נשים"></i>
            <i *ngIf="shoe.gender.indexOf('ילדים') > -1 || shoe.gender.indexOf('ילדות') > -1" class="fa fa-child fa-lg" title="ילדים"></i>
          </td>
          <td>
            <button type="button" class="icon-btn icon-btn-danger" [attr.aria-label]="'מחק ' + shoe.name" (click)="deleteShoeConfirm(shoe)">
              <i class="fa fa-trash" aria-hidden="true"></i>
            </button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
