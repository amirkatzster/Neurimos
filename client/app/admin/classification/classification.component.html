<app-loading [condition]="isLoading"></app-loading>
<app-toast [message]="toast.message"></app-toast>

<div class="admin-section" dir="rtl" *ngIf="!isLoading">
  <div class="section-header">
    <div>
      <h5 class="section-title">סוגי נעליים</h5>
      <span class="section-count">{{classifications.length}} סוגים</span>
    </div>
    <button type="button" (click)="addClassification()" class="btn-add">
      <i class="fa fa-plus"></i>
      <span>סוג חדש</span>
    </button>
  </div>

  <div *ngIf="classifications.length === 0" class="empty-state">
    <i class="fa fa-tags fa-2x"></i>
    <p>אין סוגי נעליים</p>
  </div>

  <div class="classification-list">
    <div *ngFor="let classification of classifications; let i = index" class="classification-row">
      <div class="classification-order">{{classification.order}}</div>
      <div class="classification-name">{{classification.name}}</div>
      <span *ngIf="classification.show" class="show-badge">בחלון ראווה</span>
      <button class="icon-btn icon-btn-edit" (click)="enableEditing(classification, i)">
        <i class="fa fa-pencil"></i>
      </button>
    </div>
  </div>
</div>

<!-- Edit Modal -->
<div class="modal-backdrop fade show" *ngIf="isDialogOpen" (click)="isDialogOpen = false"></div>
<div class="modal d-block" tabindex="-1" *ngIf="isDialogOpen">
  <div class="modal-dialog modal-dialog-centered" dir="rtl">
    <div class="modal-content admin-modal">
      <form (ngSubmit)="doneEditClassification(currentClassification)">
        <div class="modal-header">
          <h5 class="modal-title">עריכת סוג נעל</h5>
          <button type="button" class="btn-close" (click)="isDialogOpen = false"></button>
        </div>
        <div class="modal-body">
          <div class="form-group mb-3">
            <label class="form-label">שם הסוג</label>
            <input class="form-control" type="text" name="name" [(ngModel)]="currentClassification.name" placeholder="לדוגמה: סנדל, נעל ספורט..." required>
          </div>
          <div class="form-group mb-3">
            <label class="form-label">סדר הופעה</label>
            <input class="form-control" type="number" name="order" [(ngModel)]="currentClassification.order" placeholder="0" min="0">
          </div>
          <div class="form-group">
            <mat-checkbox name="show" [(ngModel)]="currentClassification.show" [checked]="currentClassification.show">
              להציג בחלון ראווה
            </mat-checkbox>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-outline-secondary" (click)="isDialogOpen = false">ביטול</button>
          <button type="submit" class="btn btn-primary">שמור</button>
        </div>
      </form>
    </div>
  </div>
</div>
