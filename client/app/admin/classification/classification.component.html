<app-loading [condition]="isLoading"></app-loading>
<app-toast [message]="toast.message"></app-toast>

<!-- ─── List View ─────────────────────────────────────────────────────────── -->
<div class="admin-section" dir="rtl" *ngIf="!isLoading && !isDialogOpen">
  <div class="section-header">
    <div>
      <h5 class="section-title">סוגי נעליים</h5>
      <span class="section-count">{{classifications.length}} סוגים</span>
    </div>
    <button type="button" (click)="addClassification()" class="btn-add">
      <i class="fa fa-plus"></i>
      <span>סוג חדש</span>
    </button>
  </div>

  <div *ngIf="classifications.length === 0" class="empty-state">
    <i class="fa fa-tags fa-2x"></i>
    <p>אין סוגי נעליים</p>
  </div>

  <div class="classification-list">
    <div *ngFor="let classification of classifications; let i = index"
      class="classification-row" (click)="enableEditing(classification, i)">
      <div class="classification-order">{{classification.order}}</div>
      <div class="classification-name">{{classification.name}}</div>
      <span *ngIf="classification.show" class="show-badge">
        <i class="fa fa-eye"></i> חלון ראווה
      </span>
      <button class="icon-btn icon-btn-edit" (click)="$event.stopPropagation(); enableEditing(classification, i)">
        <i class="fa fa-pencil"></i>
      </button>
    </div>
  </div>
</div>

<!-- ─── Edit View ─────────────────────────────────────────────────────────── -->
<div class="admin-edit-container" dir="rtl" *ngIf="isDialogOpen">
  <form #editForm="ngForm" (ngSubmit)="doneEditClassification(currentClassification)">

    <div class="admin-action-bar">
      <div class="bar-group">
        <button type="button" class="bar-btn bar-btn-ghost" (click)="isDialogOpen = false">
          <i class="fa fa-arrow-right"></i>
          <span class="bar-btn-label">חזרה</span>
        </button>
      </div>
      <h5 class="bar-title">{{ currentClassification.name || 'סוג חדש' }}</h5>
      <div class="bar-group">
        <button type="submit" class="bar-btn bar-btn-primary" [disabled]="!editForm.form.valid">
          <i class="fa fa-save"></i>
          <span class="bar-btn-label">שמור</span>
        </button>
      </div>
    </div>

    <div class="edit-card">
      <div class="edit-card-header"><i class="fa fa-tag"></i> פרטי סיווג</div>
      <div class="edit-card-body">

        <div class="field-block mb-3">
          <label class="field-label">שם הסוג</label>
          <input class="field-input" type="text" name="name" [(ngModel)]="currentClassification.name"
            placeholder="לדוגמה: סנדל, נעל ספורט..." required>
        </div>

        <div class="field-block mb-4">
          <label class="field-label">סדר הופעה</label>
          <input class="field-input order-input" type="number" name="order"
            [(ngModel)]="currentClassification.order" placeholder="0" min="0">
        </div>

        <label class="visibility-toggle" [class.is-active]="currentClassification.show">
          <input type="checkbox" name="show" [(ngModel)]="currentClassification.show" hidden>
          <i class="fa visibility-icon" [class.fa-eye]="currentClassification.show" [class.fa-eye-slash]="!currentClassification.show"></i>
          <div class="visibility-text">
            <span class="visibility-label">{{ currentClassification.show ? 'מוצג בחלון ראווה' : 'לא מוצג בחלון ראווה' }}</span>
            <span class="visibility-sub">{{ currentClassification.show ? 'לחץ להסתרה' : 'לחץ להצגה' }}</span>
          </div>
          <div class="toggle-switch" [class.on]="currentClassification.show">
            <div class="toggle-knob"></div>
          </div>
        </label>

      </div>
    </div>

    <div class="edit-bottom-bar">
      <button type="button" class="btn btn-outline-secondary" (click)="isDialogOpen = false">
        <i class="fa fa-arrow-right"></i> חזרה
      </button>
      <button type="submit" class="btn btn-primary px-4" [disabled]="!editForm.form.valid">
        <i class="fa fa-save"></i> שמור
      </button>
    </div>

  </form>
</div>
