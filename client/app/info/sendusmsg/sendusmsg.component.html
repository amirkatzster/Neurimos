<app-toast [message]="toast.message"></app-toast>

<div class="contact-page">
  <div class="container">

    <!-- Page header -->
    <div class="contact-header">
      <h1>צרו קשר</h1>
      <p>נשמח לשמוע מכם — נענה בהקדם האפשרי</p>
    </div>

    <div class="contact-grid">

      <!-- Map + address (desktop) -->
      <div class="contact-map-col d-none d-md-flex">
        <div class="map-wrap">
          <iframe
            src="https://maps.google.com/maps?q=32.0215089,34.7759857&hl=he&z=16&output=embed"
            width="100%" style="border:0;" allowfullscreen="" loading="lazy"
            referrerpolicy="no-referrer-when-downgrade" title="מפת נעלי נעורים">
          </iframe>
        </div>

        <div class="address-block">
          <div class="address-row">
            <i class="fa fa-map-marker"></i>
            <div>
              <strong>אופנת נעלי נעורים בע"מ</strong><br>
              שנקר 52, חולון, ישראל
            </div>
          </div>
          <div class="address-row">
            <i class="fa fa-phone"></i>
            <div><a href="tel:035052769">03-5052769</a></div>
          </div>
          <div class="address-row">
            <i class="fa fa-clock-o"></i>
            <div>ראשון–חמישי: 9:00–19:00<br>שישי: 9:00–14:00</div>
          </div>
        </div>
      </div>

      <!-- Contact form -->
      <div class="contact-form-col">
        <div class="form-card">
          <h2 class="form-title">
            <i class="fa fa-envelope-o"></i> שלחו לנו הודעה
          </h2>

          <form #contactusform="ngForm" (ngSubmit)="sendMessage()">
            <div class="field-group">
              <label for="contactName">שם</label>
              <input id="contactName" type="text" class="field-input" name="name"
                     [(ngModel)]="msg.name" placeholder="השם שלכם" required>
            </div>

            <div class="field-group">
              <label for="contactMail">דוא"ל</label>
              <input id="contactMail" type="email" class="field-input" name="mail"
                     [(ngModel)]="msg.mail" placeholder="example@email.com" required>
            </div>

            <div class="field-group">
              <label for="contactPhone">טלפון <span class="optional">(אופציונלי)</span></label>
              <input id="contactPhone" type="tel" class="field-input" name="phone"
                     [(ngModel)]="msg.phone" placeholder="050-0000000">
            </div>

            <div class="field-group">
              <label for="contactMessage">הודעה</label>
              <textarea id="contactMessage" class="field-input field-textarea" name="message" rows="5"
                        [(ngModel)]="msg.message" placeholder="במה נוכל לעזור?" required></textarea>
            </div>

            <button class="submit-btn" type="submit" [disabled]="!contactusform.form.valid">
              <i class="fa fa-paper-plane-o"></i> שליחה
            </button>
          </form>
        </div>
      </div>

    </div>
  </div>
</div>
